<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Averi</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #222;
        }
        .container {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            box-sizing: border-box;
            text-align: center;
        }
        .logo {
            max-width: 90%;
            max-height: 60vh;
            height: auto;
            margin-bottom: 2rem;
        }
        .message {
            max-width: 640px;
            font-size: 1.125rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <img
            class="logo"
            src="logo.gif"
            alt="Averi logo"
        >
        <p class="message">
            Our hosting provider, SquareSpace, is currently operating in a degraded condition. Please check back later when SquareSpace has restored service or we have completed a migration to a new host.
        </p>
    </div>
</body>
</html>
